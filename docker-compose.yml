services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sparta:latest
    expose:
      - "80"
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: sparta-api:latest
    expose:
      - "4000"
    environment:
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (see .env.example)}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - api_data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-ssl@betmart.com.br}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  api_data:
