server {
    listen 80;
    listen [::]:80;
    # Primary hostname + `_` fallback so `docker run` on localhost still works
    server_name calisthenics.betmart.com.br _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Do not index (reinforces <meta name="robots">). Duplicated in any `location` that uses its own add_header (nginx inheritance).
    add_header X-Robots-Tag "noindex, nofollow" always;

    # SPA: client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
